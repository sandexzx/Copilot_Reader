# ============================================================================
# TL;DR
# ============================================================================
# Build a web app that monitors ~/.copilot/session-state/ and displays all
# Copilot CLI operations in a beautiful IDE-style dark interface. The backend
# (FastAPI) discovers sessions, parses events.jsonl, detects active sessions
# via lock files, and streams events over WebSocket. The frontend (SvelteKit)
# renders a VS Code-inspired UI with a session sidebar, real-time event stream,
# nested tree view, and statistics panel. MVP targets: real-time streaming,
# session list with active indicators, statistics, and tree view.

# ============================================================================
# Non-Goals (Explicitly Out of Scope for MVP)
# ============================================================================
non_goals:
  - Multi-user authentication or access control
  - Session modification or write operations (read-only tool)
  - session.db (SQLite) parsing — only events.jsonl and workspace.yaml
  - session-store.db (global SQLite) integration
  - Mobile-responsive layout (desktop-first)
  - Persistent server-side storage or caching (all derived from files)
  - Deployment / production Docker images (local dev tool only)
  - Internationalization (English UI only)
  - Unit test coverage targets (focus on integration-level acceptance criteria)
  - Keyboard shortcuts beyond basic search
  - Export / download functionality
  - Cost calculation (just token counts)

# ============================================================================
# Open Questions
# ============================================================================
open_questions:
  - id: oq-1
    question: "Should we watch ALL sessions or only active ones?"
    recommendation: "Watch active sessions via inotify, load inactive on-demand via REST"
    impact: "Affects memory usage and file descriptor count"
    decision: "adopted"

  - id: oq-2
    question: "Frontend build: SSR or SPA mode?"
    recommendation: "SPA (adapter-static) — no server rendering needed for a local dev tool"
    impact: "Simplifies deployment to a single static build served by FastAPI"
    decision: "adopted"

  - id: oq-3
    question: "File watching library: watchdog vs inotifyx vs manual polling?"
    recommendation: "watchdog — pure Python, well-maintained, inotify on Linux, cross-platform fallback"
    impact: "Dependency choice, affects reliability of real-time detection"
    decision: "adopted"

# ============================================================================
# Architecture Decisions
# ============================================================================
architecture:
  overview: |
    Single-process FastAPI server serves both REST API and WebSocket connections.
    Frontend is a SvelteKit SPA built to static files and served by FastAPI's
    StaticFiles middleware. File watching uses watchdog (inotify on Linux).

  backend:
    entry: "backend/main.py — FastAPI app with CORS, static files, API router"
    components:
      - name: models
        file: "backend/models.py"
        responsibility: "Pydantic models for Session, Event, SessionStats, WebSocket messages"
        interface: "Imported by all other modules"

      - name: event_parser
        file: "backend/event_parser.py"
        responsibility: |
          Parse events.jsonl lines into Event objects.
          Correlate tool.execution_complete with tool.execution_start via toolCallId.
          Build parent-child tree from parentId links.
          Compute session statistics (tokens, duration, model, event counts).
        interface: |
          parse_event(line: str) -> Event
          parse_events_file(path: Path) -> list[Event]
          correlate_tool_names(events: list[Event]) -> list[Event]
          build_event_tree(events: list[Event]) -> list[TreeNode]
          compute_stats(events: list[Event]) -> SessionStats

      - name: session_manager
        file: "backend/session_manager.py"
        responsibility: |
          Discover all sessions in ~/.copilot/session-state/.
          Parse workspace.yaml for metadata (id, cwd, summary, timestamps).
          Detect active sessions via inuse.*.lock + PID validation.
          Watch for new sessions appearing.
        interface: |
          discover_sessions() -> list[Session]
          is_session_active(session_dir: Path) -> bool
          get_session_metadata(session_dir: Path) -> Session
          watch_sessions_dir(callback) -> None

      - name: file_watcher
        file: "backend/file_watcher.py"
        responsibility: |
          Watch events.jsonl of active sessions using watchdog (inotify).
          Track file position, read only new lines on modification.
          Emit parsed events to registered callbacks.
          Handle file rotation/truncation gracefully.
        interface: |
          FileWatcher(session_dir: Path, on_event: Callback)
          start() -> None
          stop() -> None

      - name: rest_api
        file: "backend/api/sessions.py"
        responsibility: "REST endpoints for session listing, details, and statistics"
        interface: |
          GET /api/sessions -> list[SessionSummary]
          GET /api/sessions/{id} -> SessionDetail (metadata + events)
          GET /api/sessions/{id}/stats -> SessionStats

      - name: websocket_api
        file: "backend/api/websocket.py"
        responsibility: |
          WebSocket endpoint for real-time event streaming.
          On connect: optionally send backlog of existing events.
          On file change: push new events to all connected clients for that session.
        interface: |
          WS /ws/sessions/{id}/events

  frontend:
    framework: "SvelteKit 2 + Svelte 5 (runes mode)"
    build: "Bun, adapter-static for SPA output"
    structure:
      - name: layout
        files: ["src/routes/+layout.svelte", "src/app.css"]
        responsibility: "Root layout with sidebar + main area, CSS variables from demo-a"

      - name: stores
        files: ["src/lib/stores/sessions.ts", "src/lib/stores/events.ts", "src/lib/stores/websocket.ts"]
        responsibility: |
          sessions store: fetch session list, selected session, polling for updates
          events store: current session events, append on WebSocket message
          websocket store: manage WS connection lifecycle, reconnect logic

      - name: components
        files:
          - "src/lib/components/SessionCard.svelte — sidebar session item"
          - "src/lib/components/EventRow.svelte — single event in stream"
          - "src/lib/components/EventStream.svelte — scrollable event list with auto-scroll"
          - "src/lib/components/EventTree.svelte — nested tree view"
          - "src/lib/components/StatCard.svelte — single statistic card"
          - "src/lib/components/StatsPanel.svelte — statistics grid + bar charts"
          - "src/lib/components/SearchBar.svelte — event search/filter"
          - "src/lib/components/JsonViewer.svelte — syntax-highlighted JSON"

  integration:
    - "FastAPI serves SvelteKit build output at / via StaticFiles (fallback=True)"
    - "API endpoints at /api/* and /ws/* are registered before static files"
    - "CORS middleware for dev mode (Vite dev server on different port)"
    - "start.sh launches both backend and frontend dev servers"

# ============================================================================
# Pre-Mortem Analysis
# ============================================================================
pre_mortem:
  overall_risk: medium
  critical_failures:
    - scenario: "events.jsonl burst writes (7 events/ms) cause partial JSON line reads"
      likelihood: high
      impact: high
      mitigation: |
        Read file line-by-line, only process complete lines (ending with \n).
        Buffer incomplete trailing data between reads.
        Validate JSON parse before emitting events.

    - scenario: "inotify watchers exhaust kernel limits with many active sessions"
      likelihood: low
      impact: medium
      mitigation: |
        Only watch active sessions (those with valid lock files).
        Default inotify limit is 65K watches — we need ~1 per active session.
        Typical active sessions: 1-3 at a time.

    - scenario: "Large session files (8MB, 3490 lines) cause slow initial load"
      likelihood: medium
      impact: medium
      mitigation: |
        Parse events lazily or with pagination for initial load.
        REST API returns events paginated (limit/offset).
        Frontend virtualizes event list for large sessions.

    - scenario: "tool.execution_complete missing toolName breaks tool display"
      likelihood: high
      impact: medium
      mitigation: |
        Maintain toolCallId → toolName index from tool.execution_start events.
        On tool.execution_complete, look up toolName by toolCallId.
        Fallback to "unknown_tool" if correlation fails.

    - scenario: "Session directory deleted or moved while being watched"
      likelihood: low
      impact: low
      mitigation: |
        Watchdog handles filesystem events for deletion.
        FileWatcher stops gracefully on file not found.
        SessionManager removes deleted sessions from active list.

  resume_window:
    focus_tasks: [task-011, task-012]
    downstream_watchlist: [task-015, task-016, task-018]
    risk_level: high
    critical_failures:
      - task: task-011
        scenario: "cache_write_tokens stays missing from the backend/frontend contract, so token totals look valid while silently undercounting usage"
        likelihood: high
        impact: high
        mitigation: |
          Update backend.models.SessionStats, backend.event_parser.compute_stats,
          the stats API response, frontend types, StatsPanel, and API/parser tests
          in one pass. Freeze the field name as cache_write_tokens end-to-end.

      - task: task-011
        scenario: "Cache Write is added to the chart but not the stat grid, loading skeleton, or expected accent colors, causing a partially correct UI that still violates the task contract"
        likelihood: medium
        impact: medium
        mitigation: |
          Treat the stat cards, chart series, and loading state as one contract.
          Verify the card set, four-bar chart, and color expectations together
          before handing off to design-polish work.

      - task: task-012
        scenario: "Tree rendering keeps reading tool labels from event.data.tool_name while correlated names live on event.tool_name, leaving completed tool nodes unlabeled or mislabeled"
        likelihood: high
        impact: high
        mitigation: |
          Make the tree contract explicit: prefer event.tool_name, then fall back
          to event.data.tool_name or event.data.toolName only when necessary.
          Add tests that cover completed tool nodes and sub-agent labels.

      - task: task-012
        scenario: "Depth and cycle protection are handled only in the UI, so pathological parentId chains still create oversized or recursive API payloads"
        likelihood: medium
        impact: high
        mitigation: |
          Enforce the depth cap and cycle guard in backend tree construction.
          Add deep-chain and cycle fixtures so the API contract is safe before
          the recursive Svelte renderer consumes it.

      - task: task-015
        scenario: "Static serving and start.sh are validated against a stale dev-only path before the stats/tree API contract stabilizes, forcing a second integration pass"
        likelihood: medium
        impact: medium
        mitigation: |
          Keep task-015 ready but deferred until tasks 011 and 012 exit the
          resume window. Validate built assets against the finalized stats/tree
          endpoints rather than the interim dev flow.

      - task: task-016
        scenario: "Security review starts before runtime routing and final response shapes settle, producing duplicate findings and re-review churn"
        likelihood: medium
        impact: low
        mitigation: |
          Keep task-016 blocked on task-015 so the reviewer sees the final UUID
          validation, static-file precedence, and production error surface once.

      - task: task-018
        scenario: "End-to-end validation exercises only shallow fixtures, so deep tree regressions and missing Cache Write rendering slip through"
        likelihood: medium
        impact: high
        mitigation: |
          Include deep parent chains, completed tool nodes, and Cache Write stats
          in the browser validation checklist once tasks 011 and 012 complete.

  assumptions:
    - "~/.copilot/session-state/ exists and is readable"
    - "events.jsonl format is stable across Copilot CLI versions"
    - "Active sessions always have inuse.*.lock files"
    - "Lock file PID is always a valid integer"
    - "workspace.yaml is valid YAML with at minimum: id, cwd, summary fields"
    - "User runs the tool on the same machine where Copilot CLI sessions run"
    - "Python 3.12, Node 22, and Bun 1.3+ are available"

# ============================================================================
# Task DAG
# ============================================================================
tasks:
  # ==========================================================================
  # PHASE 1: Foundation (parallel)
  # ==========================================================================

  - id: task-001
    title: "Backend project scaffold with FastAPI"
    description: |
      Create the backend Python project structure with FastAPI, configure
      dependencies, and verify the server starts and responds to health checks.
      This is the foundation all backend tasks depend on.
    agent: gem-implementer
    priority: critical
    effort: small
    dependencies: []
    context_files:
      - "MEMORY.md"
      - "demos/demo-a-ide/index.html"
    acceptance_criteria:
      - id: AC1
        criteria: "Directory backend/ exists with files: main.py, models.py, event_parser.py, session_manager.py, file_watcher.py, api/sessions.py, api/websocket.py, api/__init__.py, requirements.txt"
      - id: AC2
        criteria: "requirements.txt lists: fastapi>=0.115, uvicorn[standard], pydantic>=2.0, watchdog>=4.0, pyyaml>=6.0, aiofiles"
      - id: AC3
        criteria: "'pip install -r backend/requirements.txt' succeeds without errors"
      - id: AC4
        criteria: "'python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000' starts without errors"
      - id: AC5
        criteria: "GET http://localhost:8000/api/health returns JSON {\"status\": \"ok\"}"
      - id: AC6
        criteria: "CORS middleware is configured to allow origins ['http://localhost:5173', 'http://localhost:4173']"
      - id: AC7
        criteria: "models.py defines Pydantic models: Event, Session, SessionSummary, SessionStats, TreeNode, WebSocketMessage"
    constraints:
      - "Do NOT install packages globally — use pip install with --user or venv"
      - "Do NOT add authentication or middleware beyond CORS and health check"
      - "Do NOT implement business logic in main.py — it only wires routers"
    failure_modes:
      - scenario: "Port 8000 already in use"
        likelihood: low
        mitigation: "Make port configurable via COPILOT_READER_PORT env var, default 8000"
    tech_stack: ["python3.12", "fastapi", "uvicorn", "pydantic"]

  - id: task-002
    title: "Frontend project scaffold with SvelteKit + Bun"
    description: |
      Initialize a SvelteKit project with Svelte 5, configure Bun as the
      package manager, set up adapter-static for SPA mode, and establish
      the CSS variable system from the demo-a-ide design reference.
    agent: gem-implementer
    priority: critical
    effort: small
    dependencies: []
    context_files:
      - "demos/demo-a-ide/index.html"
    acceptance_criteria:
      - id: AC1
        criteria: "Directory frontend/ exists with standard SvelteKit structure: src/routes/, src/lib/, static/, svelte.config.js, package.json, vite.config.ts"
      - id: AC2
        criteria: "package.json has svelte 5.x, @sveltejs/kit, @sveltejs/adapter-static as dependencies"
      - id: AC3
        criteria: "'cd frontend && bun install' succeeds"
      - id: AC4
        criteria: "'cd frontend && bun run build' produces build/ directory with index.html"
      - id: AC5
        criteria: "src/app.css contains all CSS custom properties from demo-a-ide (--bg-main, --bg-sidebar, --bg-panel, --text-primary, --text-secondary, --text-accent, --border, --green, --blue, --purple, --orange, --cyan, --red, --yellow, --font-mono, --font-sans, etc.)"
      - id: AC6
        criteria: "svelte.config.js uses adapter-static with fallback: 'index.html' for SPA mode"
      - id: AC7
        criteria: "src/routes/+layout.svelte imports app.css and renders a <slot> within a .app container"
      - id: AC8
        criteria: "TypeScript is configured (tsconfig.json or jsconfig.json present)"
    constraints:
      - "Do NOT use npm or yarn — only Bun"
      - "Do NOT add component libraries (no Tailwind, no Skeleton, no DaisyUI)"
      - "Do NOT implement any components beyond the layout shell"
      - "CSS must use the exact color values from demos/demo-a-ide/index.html"
    failure_modes:
      - scenario: "Bun SvelteKit adapter-static compatibility issue"
        likelihood: low
        mitigation: "Fall back to Bun running Vite directly if adapter fails"
    tech_stack: ["sveltekit", "svelte5", "bun", "typescript"]

  # ==========================================================================
  # PHASE 2: Core Backend Logic (after task-001)
  # ==========================================================================

  - id: task-003
    title: "Event parser with tool correlation and tree building"
    description: |
      Implement the event_parser module that reads events.jsonl files, parses
      each line into an Event object, correlates tool.execution_complete with
      tool.execution_start to resolve missing toolName, and builds a nested
      tree structure from parentId chains. Also computes session statistics.
    agent: gem-implementer
    priority: critical
    effort: medium
    dependencies: [task-001]
    context_files:
      - "MEMORY.md"
      - "backend/models.py"
      - "backend/event_parser.py"
    acceptance_criteria:
      - id: AC1
        criteria: |
          parse_events_file(path) reads a real events.jsonl from
          ~/.copilot/session-state/ and returns a list of Event objects.
          Each Event has: type (str), data (dict), id (str), timestamp (datetime),
          parent_id (str|None).
      - id: AC2
        criteria: |
          correlate_tool_names(events) populates tool_name field on
          tool.execution_complete events by matching toolCallId from
          tool.execution_start events. Verified by checking that at least
          90% of tool.execution_complete events have a non-None tool_name
          after correlation on a real session.
      - id: AC3
        criteria: |
          build_event_tree(events) returns a list of TreeNode objects where
          each TreeNode has: event (Event), children (list[TreeNode]).
          Root nodes are events with parent_id=None.
      - id: AC4
        criteria: |
          compute_stats(events) returns a SessionStats object with fields:
          total_events (int), duration_seconds (float|None), models_used (list[str]),
          input_tokens (int), output_tokens (int), cache_read_tokens (int),
          cache_write_tokens (int), tool_calls (int), user_messages (int),
          assistant_turns (int).
      - id: AC5
        criteria: |
          Malformed JSON lines (truncated, empty, non-JSON) are skipped
          without raising exceptions. A warning is logged.
      - id: AC6
        criteria: |
          Running 'python -c "from backend.event_parser import parse_events_file; ..."'
          against the largest session (8MB) completes in under 5 seconds.
    constraints:
      - "Do NOT load entire file into memory at once — read line by line"
      - "Do NOT modify the events.jsonl files"
      - "Do NOT import any ML/AI libraries"
      - "Do NOT assume events are sorted by timestamp (sort after parsing)"
    failure_modes:
      - scenario: "toolCallId field name varies across Copilot CLI versions"
        likelihood: medium
        mitigation: "Search for toolCallId in both data and data.toolCall sub-objects"
      - scenario: "parentId chain creates cycles"
        likelihood: low
        mitigation: "Track visited IDs during tree building, break on revisit"
    tech_stack: ["python3.12", "pydantic"]

  - id: task-004
    title: "Session manager with active detection"
    description: |
      Implement the session_manager module that discovers all sessions in
      ~/.copilot/session-state/, reads workspace.yaml metadata, detects
      active sessions via lock files with PID validation, and provides
      a sorted session list (active first, then by date).
    agent: gem-implementer
    priority: critical
    effort: medium
    dependencies: [task-001]
    context_files:
      - "MEMORY.md"
      - "backend/models.py"
      - "backend/session_manager.py"
    acceptance_criteria:
      - id: AC1
        criteria: |
          discover_sessions() returns a list of Session objects for all
          directories in ~/.copilot/session-state/. Each Session has:
          id (str, UUID from directory name), cwd (str), summary (str|None),
          created_at (datetime), updated_at (datetime), is_active (bool),
          repository (str|None), branch (str|None).
      - id: AC2
        criteria: |
          is_session_active(session_dir) returns True only when an
          inuse.*.lock file exists AND the PID inside it corresponds
          to a running process (verified via os.kill(pid, 0) or
          /proc/{pid}/status).
      - id: AC3
        criteria: |
          Sessions are sorted: active sessions first (sorted by updated_at desc),
          then inactive sessions (sorted by updated_at desc).
      - id: AC4
        criteria: |
          discover_sessions() handles gracefully: sessions without workspace.yaml,
          sessions without events.jsonl, corrupted workspace.yaml. These sessions
          are included with fallback metadata (id from dirname, cwd=None, summary=None).
      - id: AC5
        criteria: |
          Running 'python -c "from backend.session_manager import discover_sessions; sessions = discover_sessions(); print(len(sessions))"'
          returns approximately 136 (the known session count) and completes in under 3 seconds.
      - id: AC6
        criteria: |
          get_session_metadata(session_dir) correctly parses workspace.yaml fields:
          id, cwd, summary, created_at, updated_at, repository, branch.
    constraints:
      - "Do NOT use subprocess to check PID — use os.kill(pid, 0) with signal 0"
      - "Do NOT cache session data permanently — re-read from disk each call (caching added later)"
      - "Do NOT read events.jsonl — only workspace.yaml and lock files"
      - "Do NOT follow symlinks outside ~/.copilot/session-state/"
    failure_modes:
      - scenario: "workspace.yaml has unexpected format or encoding"
        likelihood: medium
        mitigation: "Wrap YAML parsing in try/except, fall back to minimal Session with id only"
      - scenario: "Lock file exists but PID is not a number"
        likelihood: low
        mitigation: "Parse PID with try/except, treat as inactive on failure"
    tech_stack: ["python3.12", "pyyaml", "pydantic"]

  # ==========================================================================
  # PHASE 3: API Layer + File Watching (after task-003, task-004)
  # ==========================================================================

  - id: task-005
    title: "REST API endpoints for sessions and statistics"
    description: |
      Implement the REST API layer with endpoints for listing sessions,
      fetching session details with events, and computing statistics.
      Wire up the session_manager and event_parser into FastAPI route handlers.
    agent: gem-implementer
    priority: critical
    effort: medium
    dependencies: [task-003, task-004]
    context_files:
      - "backend/api/sessions.py"
      - "backend/session_manager.py"
      - "backend/event_parser.py"
      - "backend/models.py"
    acceptance_criteria:
      - id: AC1
        criteria: |
          GET /api/sessions returns a JSON array. Each element has fields:
          id (string), summary (string|null), cwd (string|null),
          created_at (ISO 8601 string), updated_at (ISO 8601 string),
          is_active (boolean), repository (string|null), branch (string|null).
      - id: AC2
        criteria: |
          GET /api/sessions returns sessions sorted: active first (by updated_at desc),
          then inactive (by updated_at desc). Response contains approximately 136 items.
      - id: AC3
        criteria: |
          GET /api/sessions/{id} returns a JSON object with session metadata
          and an 'events' array. Each event has: type, data, id, timestamp,
          parent_id. Returns 404 with {"detail": "Session not found"} for
          unknown session IDs.
      - id: AC4
        criteria: |
          GET /api/sessions/{id}/stats returns a JSON object with fields:
          total_events, duration_seconds, models_used, input_tokens,
          output_tokens, cache_read_tokens, cache_write_tokens, tool_calls,
          user_messages, assistant_turns.
      - id: AC5
        criteria: |
          GET /api/sessions/{id}/tree returns a JSON array of TreeNode objects
          representing the nested event hierarchy.
      - id: AC6
        criteria: |
          All endpoints return proper HTTP status codes: 200 for success,
          404 for not found, 500 for internal errors with error detail.
      - id: AC7
        criteria: |
          GET /api/sessions responds within 3 seconds (full session list).
          GET /api/sessions/{id} responds within 5 seconds for the largest session.
    constraints:
      - "Do NOT implement write/mutation endpoints — this is a read-only API"
      - "Do NOT add authentication"
      - "Do NOT return raw file paths in API responses for security"
    failure_modes:
      - scenario: "Large session with 3490 events causes timeout"
        likelihood: medium
        mitigation: "Add optional ?limit=N&offset=M query params to events endpoint"
    tech_stack: ["python3.12", "fastapi"]

  - id: task-006
    title: "File watcher and WebSocket real-time streaming"
    description: |
      Implement inotify-based file watching for active sessions' events.jsonl
      using watchdog, and a WebSocket endpoint that streams new events to
      connected clients in real-time. Handle connection lifecycle, multiple
      clients per session, and graceful disconnection.
    agent: gem-implementer
    priority: critical
    effort: large
    dependencies: [task-003, task-004]
    context_files:
      - "backend/file_watcher.py"
      - "backend/api/websocket.py"
      - "backend/event_parser.py"
      - "backend/models.py"
    acceptance_criteria:
      - id: AC1
        criteria: |
          FileWatcher class watches a single events.jsonl file via watchdog.
          When lines are appended, it reads only the new lines (tracks file
          position), parses them, and calls on_event(event) for each.
      - id: AC2
        criteria: |
          WS /ws/sessions/{id}/events accepts WebSocket connections.
          On connect, returns the current event count as an initial message:
          {"type": "connected", "data": {"session_id": "...", "event_count": N}}.
      - id: AC3
        criteria: |
          When events.jsonl is modified on disk (new lines appended),
          new events are pushed to all connected WebSocket clients within
          1 second. Each message is JSON: {"type": "event", "data": {<Event>}}.
      - id: AC4
        criteria: |
          WebSocket handles client disconnection gracefully — no uncaught
          exceptions, watcher resources are cleaned up when last client
          disconnects from a session.
      - id: AC5
        criteria: |
          Multiple WebSocket clients can connect to the same session
          simultaneously and all receive the same events.
      - id: AC6
        criteria: |
          Partial JSON lines (from burst writes) are buffered and only
          emitted when a complete line (ending with \n) is available.
      - id: AC7
        criteria: |
          A WebSocket connection to a non-existent session returns a close
          frame with code 4004 and reason "Session not found".
    constraints:
      - "Do NOT use threading for WebSocket handling — use asyncio"
      - "Do NOT poll faster than 200ms — use inotify events from watchdog"
      - "Do NOT watch inactive sessions — only watch when a client connects"
    failure_modes:
      - scenario: "Burst writes produce partial JSON lines"
        likelihood: high
        mitigation: "Buffer trailing incomplete lines, only process lines ending with newline"
      - scenario: "File watcher misses events during high burst"
        likelihood: medium
        mitigation: "On each inotify event, read ALL available new lines (not just one)"
    tech_stack: ["python3.12", "fastapi", "watchdog", "asyncio"]

